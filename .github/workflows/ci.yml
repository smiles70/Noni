name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: noni
          POSTGRES_PASSWORD: noni
          POSTGRES_DB: noni
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://noni:noni@localhost:5432/noni
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi 'uvicorn[standard]' pydantic pydantic-settings \
            sqlalchemy psycopg2-binary numpy python-dotenv httpx \
            pytest black ruff mypy alembic
      - name: Lint (ruff)
        run: ruff check backend/
      - name: Format check (black)
        run: black --check backend/
      - name: Run migrations
        run: alembic upgrade head
      - name: Tests
        run: pytest backend/tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Type-check
        run: npm run type-check
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: noni
          POSTGRES_PASSWORD: noni
          POSTGRES_DB: noni
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://noni:noni@localhost:5432/noni
      ENVIRONMENT: test
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      # --- Backend ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi 'uvicorn[standard]' pydantic pydantic-settings \
            sqlalchemy psycopg2-binary numpy python-dotenv httpx alembic
      - name: Run migrations
        run: alembic upgrade head
      - name: Start backend (background)
        run: |
          nohup uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 \
            > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "backend up"
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"
          cat /tmp/backend.log
          exit 1

      # --- Frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      # --- Playwright browsers (cached) ---
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browser (chromium) + OS deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Install only OS deps when browser is cached
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: frontend

      # --- E2E + axe ---
      - name: Run Playwright E2E (includes axe WCAG 2.1 AA scan)
        run: npm run test:e2e
        working-directory: frontend

      # --- Diagnostics on failure ---
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log
          retention-days: 14

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi
