name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: noni
          POSTGRES_PASSWORD: noni
          POSTGRES_DB: noni
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://noni:noni@localhost:5432/noni
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi 'uvicorn[standard]' pydantic pydantic-settings \
            sqlalchemy psycopg2-binary numpy python-dotenv httpx \
            pytest black ruff mypy alembic
      - name: Lint (ruff)
        run: ruff check backend/
      - name: Format check (black)
        run: black --check backend/
      - name: Run migrations
        run: alembic upgrade head
      - name: Tests
        run: pytest backend/tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Type-check
        run: npm run type-check
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
