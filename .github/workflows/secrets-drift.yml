name: Secrets Drift Audit

# Daily check: every key in infra/.env.example must exist in Fly and
# (where applicable) GitHub Actions. Opens / updates an issue on drift.

on:
  schedule:
    - cron: "30 5 * * *"   # 05:30 UTC daily
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP_NAME: ${{ secrets.FLY_APP_NAME || 'noni-api' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip if not yet provisioned
        id: gate
        run: |
          if [[ -z "$FLY_API_TOKEN" ]]; then
            echo "::notice::Skipping drift audit — FLY_API_TOKEN absent (Phase B not started)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.gate.outputs.skip != 'true'
      - name: Run secrets-audit
        id: audit
        if: steps.gate.outputs.skip != 'true'
        run: |
          set +e
          bash infra/scripts/secrets-audit.sh > /tmp/audit.out 2>&1
          rc=$?
          cat /tmp/audit.out
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [[ $rc -ne 0 ]]; then
            {
              echo "body<<EOF"
              echo "Secrets drift detected at $(date -u +%FT%TZ)."
              echo ""
              echo '```'
              cat /tmp/audit.out
              echo '```'
              echo ""
              echo "To reconcile: \`make secrets-sync\`"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Open / refresh drift issue
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.rc != '0'
        run: |
          existing=$(gh issue list --label secrets-drift --state open --json number --jq '.[0].number' || true)
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body-file <(echo "${{ steps.audit.outputs.body }}")
          else
            gh issue create \
              --title "Secrets drift detected" \
              --label secrets-drift \
              --body "${{ steps.audit.outputs.body }}"
          fi
