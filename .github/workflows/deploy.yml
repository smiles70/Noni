name: Deploy

# Production deploy pipeline. Skips with a notice if required secrets are
# not yet present (so CI doesn't fail before Phase B onboarding).
#
# Triggers:
#   - push to main (after CI green)
#   - manual workflow_dispatch

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      have_supabase: ${{ steps.check.outputs.have_supabase }}
    steps:
      - name: Check whether deploy secrets are present
        id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # Required for any deploy (Fly + Cloudflare Pages).
          missing=()
          for k in FLY_API_TOKEN CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [[ -z "${!k}" ]]; then missing+=("$k"); fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::notice::Deploy skipped — missing required secrets: ${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
          # Optional Supabase migration step. Skipped when DB is Fly Postgres.
          if [[ -n "$SUPABASE_ACCESS_TOKEN" && -n "$SUPABASE_PROJECT_REF" ]]; then
            echo "have_supabase=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_supabase=false" >> "$GITHUB_OUTPUT"
          fi

  supabase-db-push:
    needs: preflight
    # Only runs when both Supabase secrets are configured (signalled by
    # preflight.have_supabase). When the database is Fly Postgres (or
    # any non-Supabase Postgres) this job is skipped; Alembic owns the
    # schema and applies on backend boot via the FastAPI lifespan in
    # backend/app/main.py.
    if: needs.preflight.outputs.ready == 'true' && needs.preflight.outputs.have_supabase == 'true'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: supabase db push
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --include-all

  fly-deploy-backend:
    # `needs` ensures preflight passed; we don't gate on supabase-db-push
    # because that job is conditionally skipped in non-Supabase deploys.
    # GitHub treats skipped dependencies as "passed" only with `always()`
    # or by listing them but not blocking on their result — using
    # `if: success() || needs.supabase-db-push.result == 'skipped'`.
    needs: [preflight, supabase-db-push]
    if: success() || needs.supabase-db-push.result == 'skipped'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy backend to Fly
        # --no-cache: force fresh build. The backend container was stale
        # (permanently skipped deploys) and its Clerk JWKS cache / secrets
        # were out of date, causing 401 login loop (recovery 2026-06-11).
        run: flyctl deploy --remote-only --no-cache

  cloudflare-pages-deploy:
    needs: [preflight]  # DECOUPLED: backend already deployed
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT || 'noni-web' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Verify build environment
        working-directory: frontend
        env:
          VITE_API_BASE_URL: 'https://noni-api.fly.dev'
          # Pinned, deterministic auth config. These are PUBLIC values (provider
          # name + Clerk publishable key) and MUST match the backend's Clerk
          # instance: improved-pheasant-38.clerk.accounts.dev (CLERK_ISSUER).
          # Not sourced from the VITE_AUTH_PROVIDER secret, which was corrupted
          # ("mock" + trailing whitespace) and caused the production outage.
          VITE_AUTH_PROVIDER: 'clerk'
          VITE_CLERK_PUBLISHABLE_KEY: 'pk_test_aW1wcm92ZWQtcGhlYXNhbnQtMzguY2xlcmsuYWNjb3VudHMuZGV2JA'
          CI: true
          NODE_ENV: production
        run: npm run prebuild

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: 'https://noni-api.fly.dev'
          # Pinned, deterministic auth config. These are PUBLIC values (provider
          # name + Clerk publishable key) and MUST match the backend's Clerk
          # instance: improved-pheasant-38.clerk.accounts.dev (CLERK_ISSUER).
          # The VITE_AUTH_PROVIDER secret previously held "mock" with trailing
          # whitespace -> a mock frontend against a Clerk backend (401 login
          # loop) plus a provider-desync crash. Pinning eliminates that class.
          VITE_AUTH_PROVIDER: 'clerk'
          VITE_CLERK_PUBLISHABLE_KEY: 'pk_test_aW1wcm92ZWQtcGhlYXNhbnQtMzguY2xlcmsuYWNjb3VudHMuZGV2JA'
          CI: true
          NODE_ENV: production
        run: npm run build

      - name: Verify bundle (G3 guard)
        working-directory: frontend
        run: npm run postbuild
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: noni-web
          directory: frontend/dist
          branch: main

  smoke:
    needs: [preflight, cloudflare-pages-deploy]
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke-test production endpoints
        env:
          # Pinned: the PROD_API_BASE_URL secret is malformed (invalid port ->
          # `curl: (3) URL rejected: Port number...`). The smoke target is a
          # public, fixed URL; the backend is verified healthy here.
          PROD_API_BASE_URL: 'https://noni-api.fly.dev'
        run: bash infra/scripts/smoke-prod.sh
