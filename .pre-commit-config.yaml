# Pre-commit hooks for Noni backend.
# Install once with: pre-commit install
# Frontend hooks (prettier/tsc) run in CI rather than pre-commit
# to keep local commits fast.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/
        language_version: python3.12
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]

  # Local guardrails. Each script encodes a regression we have already
  # paid for once. Scripts scan the repo themselves, so pass_filenames
  # is false (pre-commit still triggers them only when a matching file
  # is staged, but the script reasons over the whole tree).
  - repo: local
    hooks:
      - id: no-sqlalchemy-one
        name: Prevent SQLAlchemy .one() crashes
        entry: python scripts/check_no_one.py
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$

      - id: jwt-config-check
        name: Ensure JWT decode disables aud verification
        entry: python scripts/check_jwt_decode.py
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$

      - id: axios-usage-check
        name: Prevent raw axios usage outside apiClient
        entry: node scripts/check_axios.js
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$

      - id: auth-header-check
        name: Ensure backend Authorization Bearer handling exists
        entry: python scripts/check_auth_header.py
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$

      - id: dependency-check
        name: Ensure cryptography dependency is pinned
        entry: python scripts/check_dependencies.py
        language: system
        pass_filenames: false
        files: ^requirements.*\.txt$
