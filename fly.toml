# Noni backend — Fly.io configuration.
#
# Built from the repo-root Dockerfile (multi-stage Python 3.12 + FastAPI).
# Migrations run inside the FastAPI lifespan (backend/app/main.py), so we
# do NOT use a separate `release_command` — booting the app applies any
# pending Alembic revisions before serving traffic.
#
# Secrets (DATABASE_URL, CLERK_*, SESSION_SECRET, etc.) are pushed via
# `make secrets-sync` (see infra/scripts/secrets-sync.sh) and never live
# in this file.

app = "noni-api"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "25s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "alembic upgrade head"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  # Gunicorn worker count: shared-cpu-1x (1 vCPU) -> 3 workers.
  # Each worker gets its own SQLAlchemy pool (DB_POOL_SIZE + DB_MAX_OVERFLOW connections).
  WEB_CONCURRENCY = "3"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # 2 machines minimum = redundancy + load splitting for 100 concurrent users.
  min_machines_running = 2
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
