# SOPS encryption rules
# All SOPS-encrypted files in this repo are encrypted with the age public key below.
# Private keys live at ~/.config/sops/age/keys.txt and are backed up to 1Password.
#
# The placeholder public key below will be replaced by `make secrets-bootstrap`
# on first run. Do not edit by hand after bootstrap.

creation_rules:
  # Matches both the plaintext draft (input to secrets-bootstrap.sh) and
  # the encrypted output. sops looks up creation rules against the input
  # file path during `sops --encrypt`, so the draft path must match too.
  - path_regex: \.env\.(prod|staging)(\.draft|\.sops\.yaml)$
    encrypted_regex: '^(?!#).*$'
    age: age1dlt6m3rm3qtfnywqsxff0rlc0edaj40krzm892zkyvnl4c69t5ess28hg3
