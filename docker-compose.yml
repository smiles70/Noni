services:
  db:
    image: postgres:15
    container_name: noni_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: noni
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: noni_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/noni
      ENVIRONMENT: development
      PROJECT_NAME: Noni
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noni_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
